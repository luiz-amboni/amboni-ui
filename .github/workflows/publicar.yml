name: Publicar no npm

# Dispara ao criar uma release (Releases → Draft a new release → tag v0.1.0).
# Assim publicar é um ato explícito, nunca um acidente de push.
on:
  release: { types: [published] }
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # procedência (npm provenance): prova que o pacote saiu deste repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      # Nunca publica quebrado: contraste WCAG, axe e comportamento passam antes.
      - run: npm test

      # E nunca publica gordo: o orçamento de tamanho é contrato, não sugestão.
      - run: npm run size -w @amboni/ui

      # `changeset publish` no lugar de um `npm publish` por pacote.
      #
      # A diferença que importa: ele publica só o que MUDOU de versão e pula o que já está
      # no registro. O `npm publish` direto responde 403 ao reencontrar uma versão que já
      # existe — então um disparo repetido derrubava o workflow no primeiro pacote e o
      # segundo nunca subia. Com dois pacotes de versão casada, isso deixa a biblioteca
      # publicada pela METADE: a UI lendo variáveis de um `tokens` que não chegou, e a tela
      # de quem instalou fica sem cor nenhuma.
      #
      # Ele também cria as tags de git de cada pacote.
      - name: Publicar
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
          # A procedência vem por env porque quem chama o `npm publish` aqui é o
          # changesets, e não dá para passar `--provenance` na linha de comando dele.
          NPM_CONFIG_PROVENANCE: 'true'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
